<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章 | FZ 的博客</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="fz-overrides.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html"><span class="brand-mark">FZ</span><span>FZ 的博客</span></a>
    <button class="nav-toggle" type="button" aria-label="打开导航" data-nav-toggle>☰</button>
    <nav class="nav" data-nav>
      <a href="index.html">首页</a>
      <a class="active" href="articles.html">文章</a>
      <a href="projects.html">留言板</a>
      <a href="about.html">关于我</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-title">
      <p class="kicker">Writing System</p>
      <h1>文章与学习笔记</h1>
      <p>文章从 Supabase 动态读取。你可以在 Supabase 的 `blog_posts` 表里写 Markdown，发布后这里会自动同步。</p>
    </section>

    <section class="section search-panel">
      <label for="searchInput">搜索文章内容</label>
      <div class="search-row">
        <input id="searchInput" type="search" placeholder="C, C++, JavaScript, Linux, FPGA, Python..." data-blog-search-input />
        <button class="btn primary" type="button" data-blog-clear-search>清空</button>
      </div>
      <div class="search-results" data-blog-search-results></div>
    </section>

    <section class="section layout-sidebar">
      <aside class="sidebar">
        <h2>技术栏</h2>
        <div class="tag-cloud vertical" data-blog-filter-group>
          <button class="active" data-filter="all">全部</button>
          <button data-filter="C">C语言</button>
          <button data-filter="CPP">C++</button>
          <button data-filter="JavaScript">JavaScript</button>
          <button data-filter="Java">Java</button>
          <button data-filter="HTML">HTML</button>
          <button data-filter="CSS">CSS</button>
          <button data-filter="Python">Python</button>
          <button data-filter="Linux">Linux</button>
          <button data-filter="FPGA">FPGA</button>
          <button data-filter="Notes">Notes</button>
        </div>
        <div class="writer-note">
          <p class="kicker">Write</p>
          <p>写文章：打开 Supabase Table Editor，进入 `blog_posts` 表，新建一行并把 `is_published` 设为 true。</p>
        </div>
      </aside>

      <div class="article-list" data-dynamic-article-list>
        <p class="message-empty">正在加载文章...</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span>© 2026 FZ 的博客</span>
    <a href="projects.html">留言板</a>
  </footer>
  <script src="config.js"></script>
  <script src="script.js"></script>
  <script src="blog.js"></script>
</body>
</html>
