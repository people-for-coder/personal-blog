<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>留言板 | FZ 的博客</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="fz-overrides.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html"><span class="brand-mark">FZ</span><span>FZ 的博客</span></a>
    <button class="nav-toggle" type="button" aria-label="打开导航" data-nav-toggle>☰</button>
    <nav class="nav" data-nav>
      <a href="index.html">首页</a>
      <a href="articles.html">文章</a>
      <a class="active" href="projects.html">留言板</a>
      <a href="about.html">关于我</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-title">
      <p class="kicker">Message Board</p>
      <h1>留言板</h1>
      <p>欢迎留下想法、建议或鼓励。留言会先进入审核队列，通过后会同步显示在这个页面，其他设备也能看到。</p>
    </section>

    <section class="section guestbook-composer" aria-label="写留言">
      <div class="section-head">
        <div>
          <p class="kicker">New Message</p>
          <h2>写一条留言</h2>
        </div>
      </div>
      <form class="message-form" data-message-form>
        <label>
          昵称
          <input type="text" name="author_name" maxlength="40" minlength="2" placeholder="你的昵称" required />
        </label>
        <label>
          留言内容
          <textarea name="content" rows="5" maxlength="1200" minlength="4" placeholder="写下想说的话，最多 1200 字。" required></textarea>
        </label>
        <label>
          上传图片（可选）
          <input type="file" name="image" accept="image/*" data-message-image />
        </label>
        <div class="message-preview is-hidden" data-message-preview>
          <img alt="上传图片预览" data-message-preview-image />
          <button class="btn ghost" type="button" data-clear-message-image>移除图片</button>
        </div>
        <div class="composer-actions">
          <p data-message-status aria-live="polite"></p>
          <button class="btn primary" type="submit">提交审核</button>
        </div>
      </form>
    </section>

    <section class="section guestbook-list" aria-label="留言列表">
      <div class="guestbook-remote-list" data-remote-messages>
        <p class="message-empty">正在加载留言...</p>
      </div>
    </section>
  </main>

  <footer class="footer"><span>© 2026 FZ 的博客</span><a href="articles.html">返回文章</a></footer>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
